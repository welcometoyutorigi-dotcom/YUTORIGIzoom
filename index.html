<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zoomイベント | YUTORIGI 〜遊鳥木〜</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Zen+Old+Mincho:wght@400;700&family=Noto+Serif+JP:wght@300;400&display=swap" rel="stylesheet">
<style>
:root {
  --sage: #8aaa87;
  --sage-light: #b8d0b4;
  --sage-pale: #e4efe2;
  --cream: #f7f2ea;
  --beige: #e8e0d0;
  --sky: #a0c4d0;
  --sky-light: #c8dfe8;
  --sky-pale: #e6f2f6;
  --text: #4a4035;
  --text-light: #8a7a6a;
  --white: #fdfcfa;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'Noto Serif JP',serif;background:var(--white);color:var(--text);overflow-x:hidden;}

/* ── HEADER ── */
.site-header{text-align:center;padding:28px 24px 22px;background:linear-gradient(160deg,#eef6f8 0%,#f0f7ef 100%);position:relative;}
.site-header .logo{font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:300;letter-spacing:.22em;color:var(--text);}
.site-header .logo-sub{font-size:.66rem;color:var(--text-light);letter-spacing:.28em;margin-top:2px;}

/* ── HERO ── */
.hero{position:relative;padding:64px 24px 72px;text-align:center;background:linear-gradient(160deg,#f0f8fb 0%,#f0f7ef 100%);overflow:hidden;}
.hero-content{position:relative;z-index:2;max-width:580px;margin:0 auto;}
.hero-badge{display:inline-block;background:linear-gradient(135deg,var(--sky-pale),var(--sage-pale));border:1.5px solid var(--sky-light);color:var(--sky);font-size:.68rem;letter-spacing:.25em;padding:5px 18px;border-radius:20px;margin-bottom:18px;}
.hero-title{font-family:'Zen Old Mincho',serif;font-size:clamp(1.5rem,5.5vw,2.4rem);font-weight:700;line-height:1.55;color:var(--text);margin-bottom:8px;}
.hero-line{width:44px;height:1.5px;background:linear-gradient(to right,var(--sage),var(--sky));margin:0 auto 22px;}

/* ── FORM SECTION ── */
.form-section{padding:72px 24px;background:linear-gradient(160deg,#e8f4f8 0%,#f0f8ef 100%);text-align:center;}
.form-wrap{max-width:640px;margin:36px auto 0;}
.btn-apply{display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,var(--sage),#6a9067);color:white;padding:16px 36px;border-radius:50px;font-family:'Noto Serif JP',serif;font-size:.86rem;letter-spacing:.1em;text-decoration:none;box-shadow:0 6px 20px rgba(138,170,135,.38);transition:all .3s;}

/* ── FOOTER ── */
footer{padding:40px 24px;background:linear-gradient(160deg,#e4efe2,#e2eef5);text-align:center;}
footer .logo{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:300;letter-spacing:.22em;color:var(--text);margin-bottom:3px;}
footer .logo-jp{font-size:.66rem;color:var(--text-light);letter-spacing:.28em;margin-bottom:12px;}
</style>
</head>
<body>

<header class="site-header">
  <p class="logo">YUTORIGI</p>
  <p class="logo-sub">〜 遊 鳥 木 〜　ヒーリング ＆ リラクゼーションサロン</p>
</header>

<section class="hero">
  <div class="hero-content">
    <div class="hero-badge">💻 Zoom オンライン開催</div>
    <h1 class="hero-title">スピリチュアルカウンセリング<br>お試し無料体験会</h1>
    <div class="hero-line"></div>
    <p>「スピリチュアルって難しそう…」そんな軽い気持ちで大丈夫です</p>
  </div>
</section>

<section class="form-section">
  <h2 style="font-family:'Zen Old Mincho',serif;margin-bottom:20px;">参加申し込み</h2>
  <div class="form-wrap">
    <p style="margin-bottom:30px;">下のボタンから申し込みフォームを開いてください😊</p>
    <a href="https://script.google.com/macros/s/AKfycbyCcV9v0Fi3G69tSHebP5OfNBi15HzHFIvSM9rk52HicEA6pG38ov_BAcorufcbLKU/exec" target="_blank" class="btn-apply">
      📝 申し込みフォームを開く
    </a>
  </div>
</section>

<footer>
  <p class="logo">YUTORIGI</p>
  <p class="logo-jp">〜 遊 鳥 木 〜</p>
  <p>© YUTORIGI All Rights Reserved.</p>
</footer>

</body>
</html>
